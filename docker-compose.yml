services:
  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    ports:
      - "10303:27017"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: grocerzy-backend
    env_file: .env          # NVIDIA + Magento creds injected at runtime
    environment:
      # Reach the Mongo container by service name (overrides .env for Docker).
      MONGO_URL: mongodb://mongo:27017
    networks:
      - app_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "10302:8000"
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Where the browser reaches the backend (published port on the host).
        # Relative base → browser hits the frontend's own origin; nginx proxies
        # /api/* to the backend container. Works from any host/IP.
        VITE_API_BASE: /api
    networks:
      - app_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    image: grocerzy-frontend
    ports:
      - "10301:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo-data:

networks:
  app_network:
    driver: bridge