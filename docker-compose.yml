services:
  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    ports:
      - "10303:27017"
    networks:              # must join app_network so backend can resolve "mongo"
      - app_network
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.18.3   # pinned to match the qdrant-client (1.18) → no version-skew warning
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "10304:6333"        # REST + dashboard at http://localhost:10304/dashboard
    networks:
      - app_network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: grocerzy-backend
    env_file: .env          # NVIDIA + Magento creds injected at runtime
    environment:
      # Reach the Mongo container by service name (overrides .env for Docker).
      MONGO_URL: mongodb://mongo:27017
      # Same trick for Qdrant — reachable by service name inside app_network.
      QDRANT_URL: http://qdrant:6333
    networks:
      - app_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "10302:8000"
    depends_on:
      - mongo
      - qdrant
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Where the browser reaches the backend (published port on the host).
        # Relative base → browser hits the frontend's own origin; nginx proxies
        # /api/* to the backend container. Works from any host/IP.
        VITE_API_BASE: /api
    networks:
      - app_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    image: grocerzy-frontend
    ports:
      - "10301:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo-data:
  qdrant-data:

networks:
  app_network:
    driver: bridge