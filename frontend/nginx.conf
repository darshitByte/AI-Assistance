server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Same-origin API proxy → backend container over the Docker network.
    # Lets the browser use a relative /api base, so it works from any host/IP.
    # Trailing slash strips the /api prefix: /api/auth/login → /auth/login.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;   # LLM chat turns can run long
    }

    # SPA fallback — serve index.html for any unknown path.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
